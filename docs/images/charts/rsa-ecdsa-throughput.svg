<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 660" width="1500" height="660" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,Consolas,monospace">
  <defs>
    <pattern id="halftone" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#0a0e14"/>
      <circle cx="3" cy="3" r="1.1" fill="#cbf7ad" fill-opacity="0.55"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="#0a0e14"/>

  <text x="40" y="58" font-size="30" fill="#cbf7ed" font-weight="600">// Asymmetric Crypto &amp; FIM — ops/s and files/s</text>

  <rect x="40" y="86" width="1420" height="540" fill="none" stroke="#1a2030" stroke-width="1.4"/>

  <!-- Bookend title -->
  <g transform="translate(80,128)">
    <rect x="0" y="0" width="44" height="22" fill="url(#halftone)"/>
    <text x="320" y="18" font-size="20" fill="#cbf7ed" letter-spacing="6" text-anchor="middle">P E R - R O W   N O R M A L I S E D</text>
    <rect x="596" y="0" width="44" height="22" fill="url(#halftone)"/>
  </g>
  <g transform="translate(820,128)" font-size="18" fill="#cbf7ed">
    <rect x="0"   y="2" width="22" height="18" fill="#7ee8fa"/>
    <text x="32"  y="18">= IceBreaker</text>
    <rect x="220" y="2" width="22" height="18" fill="#eb6f92"/>
    <text x="254" y="18">= Kali</text>
  </g>

  <!-- Bars normalised within each row (different units per row).
       Plot area: x=420..1180 = 760px. Bar height 18, gap 8 between Ice/Kal, row gap 60. -->
  <g font-size="16">
    <!-- RSA-2048 sign (ops/s): Ice 2039.4 (winner), Kal 1568.0 -->
    <text x="60" y="208" fill="#cbf7ed">RSA-2048 sign</text>
    <text x="380" y="200" text-anchor="end" fill="#cbf7ad">Ice</text>
    <rect x="420" y="186" width="760" height="18" fill="#7ee8fa"/>
    <text x="1196" y="200" fill="#cbf7ad">2,039.4 ops/s</text>
    <text x="380" y="226" text-anchor="end" fill="#eb6f92">Kal</text>
    <rect x="420" y="212" width="584" height="18" fill="#eb6f92"/>
    <text x="1196" y="226" fill="#cbf7ad">1,568.0 ops/s</text>
    <text x="1380" y="218" text-anchor="end" fill="#ffb347">▲ Ice +30 %</text>

    <!-- RSA-2048 verify (ops/s): Ice 71777.6, Kal 53840.4 -->
    <text x="60" y="288" fill="#cbf7ed">RSA-2048 verify</text>
    <text x="380" y="280" text-anchor="end" fill="#cbf7ad">Ice</text>
    <rect x="420" y="266" width="760" height="18" fill="#7ee8fa"/>
    <text x="1196" y="280" fill="#cbf7ad">71,777.6 ops/s</text>
    <text x="380" y="306" text-anchor="end" fill="#eb6f92">Kal</text>
    <rect x="420" y="292" width="570" height="18" fill="#eb6f92"/>
    <text x="1196" y="306" fill="#cbf7ad">53,840.4 ops/s</text>
    <text x="1380" y="298" text-anchor="end" fill="#ffb347">▲ Ice +33 %</text>

    <!-- ECDSA-P256 sign: Ice 61623.8, Kal 57822.8 -->
    <text x="60" y="368" fill="#cbf7ed">ECDSA-P256 sign</text>
    <text x="380" y="360" text-anchor="end" fill="#cbf7ad">Ice</text>
    <rect x="420" y="346" width="760" height="18" fill="#7ee8fa"/>
    <text x="1196" y="360" fill="#cbf7ad">61,623.8 ops/s</text>
    <text x="380" y="386" text-anchor="end" fill="#eb6f92">Kal</text>
    <rect x="420" y="372" width="713" height="18" fill="#eb6f92"/>
    <text x="1196" y="386" fill="#cbf7ad">57,822.8 ops/s</text>
    <text x="1380" y="378" text-anchor="end" fill="#cbf7ad">≈ tied (−6.2 %)</text>

    <!-- FIM initial hash (files/s): Ice 31285, Kal 33466 (Kal wins) -->
    <text x="60" y="448" fill="#cbf7ed">FIM initial hash</text>
    <text x="380" y="440" text-anchor="end" fill="#cbf7ad">Ice</text>
    <rect x="420" y="426" width="710" height="18" fill="#7ee8fa"/>
    <text x="1196" y="440" fill="#cbf7ad">31,285 files/s</text>
    <text x="380" y="466" text-anchor="end" fill="#eb6f92">Kal</text>
    <rect x="420" y="452" width="760" height="18" fill="#eb6f92"/>
    <text x="1196" y="466" fill="#cbf7ad">33,466 files/s</text>
    <text x="1380" y="458" text-anchor="end" fill="#ffb347">▲ Kal +7.0 %</text>
  </g>

  <text x="40" y="600" font-size="14" fill="#7ee8fa" opacity="0.85">bars normalised per-row (each row's longer bar = 760 px) · units differ between rows · win arrows show the absolute Δ</text>
</svg>
