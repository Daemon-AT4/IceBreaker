<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 760" width="1500" height="760" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,Consolas,monospace">
  <defs>
    <pattern id="halftone" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#0a0e14"/>
      <circle cx="3" cy="3" r="1.1" fill="#cbf7ad" fill-opacity="0.6"/>
    </pattern>
    <pattern id="halftoneAmber" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#0a0e14"/>
      <circle cx="3" cy="3" r="1.1" fill="#ffb347" fill-opacity="0.65"/>
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="#0a0e14"/>

  <!-- ── Classified panel ── -->
  <g>
    <rect x="60" y="40" width="1380" height="240" fill="none" stroke="#cbf7ad" stroke-width="1.4"/>
    <text x="92"   y="86" font-size="20" fill="#cbf7ed" letter-spacing="2">CLASSIFIED</text>
    <line x1="380" y1="78" x2="980" y2="78" stroke="#cbf7ad" stroke-width="1.2"/>
    <text x="1408" y="86" font-size="20" fill="#cbf7ed" letter-spacing="2" text-anchor="end">DECLASSIFIED</text>

    <g font-size="20" fill="#cbf7ad">
      <text x="120" y="142">TARGET  :  reader · operator · adversary</text>
      <text x="120" y="178">THREAT  :  informational</text>
      <rect x="425" y="160" width="44" height="22" fill="url(#halftone)"/>
      <text x="490" y="178" fill="#cbf7ad">read, fork, rebuild, hack</text>
      <text x="120" y="214">STATUS  :</text>
      <rect x="240" y="200" width="120" height="18" fill="#cbf7ad"/>
      <rect x="376" y="200" width="92"  height="18" fill="#cbf7ad"/>
      <rect x="484" y="200" width="62"  height="18" fill="#cbf7ad"/>
      <rect x="562" y="200" width="92"  height="18" fill="#cbf7ad"/>
    </g>

    <text x="750" y="262" text-anchor="middle" font-size="22" fill="#ffb347" letter-spacing="4">DAEMON-SEC // EYES ONLY</text>
  </g>

  <!-- ── Decorative halftone rule ── -->
  <g transform="translate(0,308)">
    <rect x="60"   y="0" width="44" height="22" fill="url(#halftone)"/>
    <line x1="120" y1="11" x2="1380" y2="11" stroke="#cbf7ad" stroke-width="1.4"/>
    <rect x="1396" y="0" width="44" height="22" fill="url(#halftone)"/>
  </g>

  <!-- ── Gibson quote panel (double border) ── -->
  <g>
    <rect x="120" y="356" width="1260" height="220" fill="none" stroke="#cbf7ed" stroke-width="1.4"/>
    <rect x="132" y="368" width="1236" height="196" fill="none" stroke="#cbf7ed" stroke-width="1.0" opacity="0.55"/>
    <g font-size="22" fill="#cbf7ed">
      <text x="200" y="436">"We have no future because our present is too volatile.</text>
      <text x="200" y="472"> We only have risk management."</text>
    </g>
    <text x="1320" y="540" text-anchor="end" font-size="20" fill="#ffb347">— William Gibson, Pattern Recognition</text>
  </g>

  <!-- ── Decorative halftone rule ── -->
  <g transform="translate(0,604)">
    <rect x="60"   y="0" width="44" height="22" fill="url(#halftone)"/>
    <line x1="120" y1="11" x2="1380" y2="11" stroke="#cbf7ad" stroke-width="1.4"/>
    <rect x="1396" y="0" width="44" height="22" fill="url(#halftone)"/>
  </g>

  <!-- ── Licence ── -->
  <g transform="translate(0,650)" font-size="20" fill="#eb6f92">
    <rect x="540" y="0"  width="36" height="20" fill="url(#halftoneAmber)"/>
    <text x="592" y="16">LICENCE :: Hack the planet.</text>
    <rect x="924" y="0"  width="36" height="20" fill="url(#halftoneAmber)"/>
    <rect x="540" y="32" width="36" height="20" fill="url(#halftoneAmber)"/>
    <text x="592" y="48">Do whatever you want with it.</text>
    <rect x="924" y="32" width="36" height="20" fill="url(#halftoneAmber)"/>
  </g>
</svg>
